services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - '5432:5432'
    volumes:
      # - pgdata:/var/lib/postgresql/data is a default, but want to avoid conflicts
      - pgdata:/var/lib/postgresql/data_issi_msi1

volumes:
  pgdata:
    driver: local
